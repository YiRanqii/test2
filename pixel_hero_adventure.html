<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素勇者：深渊闯关</title>
    <style>
        /* ========================================
           全局样式设置
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* 游戏标题样式 */
        .game-title {
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #8b4513, -1px -1px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        /* 游戏容器 */
        .game-container {
            position: relative;
            width: 1000px;
            height: 500px;
            border: 4px solid #4a4a4a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        /* 游戏画布 */
        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* UI覆盖层 */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 顶部状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #4a4a4a;
        }

        /* 血量显示 */
        .health-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .health-label {
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
        }

        .health-bar {
            width: 150px;
            height: 20px;
            background: #333;
            border: 2px solid #666;
            border-radius: 4px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444 0%, #ff6666 100%);
            transition: width 0.3s ease;
        }

        .health-text {
            color: #fff;
            font-size: 12px;
            margin-left: 5px;
        }

        /* 分数显示 */
        .score-display {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        /* 能量显示 */
        .energy-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .energy-label {
            color: #4444ff;
            font-size: 14px;
            font-weight: bold;
        }

        .energy-bar {
            width: 150px;
            height: 20px;
            background: #333;
            border: 2px solid #666;
            border-radius: 4px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4444ff 0%, #6666ff 100%);
            transition: width 0.3s ease;
        }

        .energy-text {
            color: #fff;
            font-size: 12px;
            margin-left: 5px;
        }

        /* 控制按钮 */
        .control-buttons {
            position: absolute;
            top: 60px;
            right: 10px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .control-btn {
            padding: 8px 16px;
            background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 100%);
            color: #fff;
            border: 2px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 100%);
            border-color: #888;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        /* 关卡进度条 */
        .level-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-top: 2px solid #4a4a4a;
        }

        .progress-label {
            color: #fff;
            font-size: 12px;
            margin-right: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00 0%, #00cc00 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #fff;
            font-size: 12px;
            margin-left: 10px;
            min-width: 50px;
        }

        /* 暂停界面 */
        .pause-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .pause-screen.active {
            display: flex;
        }

        .pause-title {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 4px 4px 0 #8b4513;
            margin-bottom: 30px;
        }

        .pause-btn {
            padding: 15px 40px;
            background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 100%);
            color: #fff;
            border: 3px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            margin: 10px;
            transition: all 0.2s;
        }

        .pause-btn:hover {
            background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 100%);
            border-color: #888;
            transform: scale(1.05);
        }

        /* 游戏结束界面 */
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .game-over-screen.active {
            display: flex;
        }

        .game-over-title {
            color: #ff4444;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 4px 4px 0 #8b0000;
            margin-bottom: 20px;
        }

        .victory-title {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 4px 4px 0 #8b4513;
            margin-bottom: 20px;
        }

        .final-score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 100%);
            color: #fff;
            border: 3px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 100%);
            border-color: #888;
            transform: scale(1.05);
        }

        /* 操作说明 */
        .controls-info {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }

        .controls-info span {
            color: #ffd700;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="game-title">像素勇者：深渊闯关</div>
    
    <div class="game-container">
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <!-- UI覆盖层 -->
        <div class="ui-overlay">
            <!-- 顶部状态栏 -->
            <div class="status-bar">
                <!-- 血量显示 -->
                <div class="health-display">
                    <span class="health-label">HP</span>
                    <div class="health-bar">
                        <div class="health-fill" id="healthFill" style="width: 100%"></div>
                    </div>
                    <span class="health-text" id="healthText">100/100</span>
                </div>
                
                <!-- 分数显示 -->
                <div class="score-display">
                    分数: <span id="scoreText">0</span>
                </div>
                
                <!-- 能量显示 -->
                <div class="energy-display">
                    <span class="energy-label">MP</span>
                    <div class="energy-bar">
                        <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                    </div>
                    <span class="energy-text" id="energyText">50/50</span>
                </div>
            </div>
            
            <!-- 控制按钮 -->
            <div class="control-buttons">
                <button class="control-btn" id="resetBtn">重置游戏</button>
                <button class="control-btn" id="pauseBtn">暂停游戏</button>
                <button class="control-btn" id="restartLevelBtn">重启关卡</button>
            </div>
            
            <!-- 关卡进度 -->
            <div class="level-progress">
                <span class="progress-label">关卡进度</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </div>
        
        <!-- 暂停界面 -->
        <div class="pause-screen" id="pauseScreen">
            <div class="pause-title">游戏暂停</div>
            <button class="pause-btn" id="resumeBtn">继续游戏</button>
        </div>
        
        <!-- 游戏结束界面 -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-title" id="endTitle">游戏结束</div>
            <div class="final-score">最终分数: <span id="finalScore">0</span></div>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>
    
    <div class="controls-info">
        <span>← → / A D</span> 移动 
        <span>空格</span> 跳跃 
        <span>Z</span> 攻击 
        <span>X</span> 技能
    </div>

    <script>
        // ========================================
        // 游戏核心配置与全局变量
        // ========================================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 禁用图像平滑，保持像素风格
        ctx.imageSmoothingEnabled = false;
        
        // 游戏状态枚举
        const GameState = {
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'game_over',
            VICTORY: 'victory'
        };
        
        // 当前游戏状态
        let currentState = GameState.PLAYING;
        
        // 当前关卡 (1或2)
        let currentLevel = 1;
        
        // 游戏循环ID
        let gameLoopId = null;
        
        // 帧计数器，用于动画
        let frameCount = 0;
        
        // ========================================
        // 音频系统 - 使用Web Audio API生成音效
        // ========================================
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        /**
         * 播放跳跃音效
         * 使用高频快速衰减的方波模拟跳跃声
         */
        function playJumpSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
        
        /**
         * 播放攻击音效
         * 使用锯齿波模拟挥剑声
         */
        function playAttackSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }
        
        /**
         * 播放技能音效
         * 使用正弦波配合频率滑动模拟魔法释放声
         */
        function playSkillSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
        
        /**
         * 播放收集道具音效
         * 使用高频短促的正弦波模拟金币声
         */
        function playCollectSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(1600, audioCtx.currentTime + 0.05);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
        
        /**
         * 播放受伤音效
         * 使用低频噪声模拟受伤声
         */
        function playHurtSound() {
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const gainNode = audioCtx.createGain();
            noise.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            noise.start(audioCtx.currentTime);
        }
        
        // ========================================
        // 输入处理系统
        // ========================================
        
        // 键盘状态对象
        const keys = {
            left: false,
            right: false,
            up: false,
            attack: false,
            skill: false
        };
        
        /**
         * 键盘按下事件处理
         */
        document.addEventListener('keydown', (e) => {
            if (currentState !== GameState.PLAYING) return;
            
            switch(e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    keys.left = true;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    keys.right = true;
                    break;
                case 'Space':
                    if (!keys.up) {
                        keys.up = true;
                        player.jump();
                    }
                    break;
                case 'KeyZ':
                    if (!keys.attack) {
                        keys.attack = true;
                        player.attack();
                    }
                    break;
                case 'KeyX':
                    if (!keys.skill) {
                        keys.skill = true;
                        player.useSkill();
                    }
                    break;
            }
        });
        
        /**
         * 键盘释放事件处理
         */
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    keys.left = false;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    keys.right = false;
                    break;
                case 'Space':
                    keys.up = false;
                    break;
                case 'KeyZ':
                    keys.attack = false;
                    break;
                case 'KeyX':
                    keys.skill = false;
                    break;
            }
        });
        
        // ========================================
        // 玩家角色类
        // ========================================
        
        class Player {
            constructor() {
                // 位置和尺寸 (32*48像素)
                this.x = 50;
                this.y = 300;
                this.width = 32;
                this.height = 48;
                
                // 速度和物理属性
                this.vx = 0;
                this.vy = 0;
                this.speed = 4;
                this.jumpPower = -12;
                this.gravity = 0.6;
                this.onGround = false;
                
                // 状态属性
                this.health = 100;
                this.maxHealth = 100;
                this.energy = 50;
                this.maxEnergy = 50;
                this.score = 0;
                
                // 攻击相关
                this.isAttacking = false;
                this.attackCooldown = 0;
                this.attackCooldownMax = 30; // 0.5秒 (60fps)
                this.attackFrame = 0;
                this.facingRight = true;
                
                // 技能相关
                this.isUsingSkill = false;
                this.skillCooldown = 0;
                this.skillCooldownMax = 180; // 3秒
                this.skillFrame = 0;
                
                // 动画帧
                this.animFrame = 0;
                this.animTimer = 0;
                
                // 无敌时间 (受伤后)
                this.invincible = 0;
                
                // 攻击判定框
                this.attackBox = null;
                this.skillBox = null;
            }
            
            /**
             * 更新玩家状态
             */
            update() {
                // 更新无敌时间
                if (this.invincible > 0) {
                    this.invincible--;
                }
                
                // 更新攻击冷却
                if (this.attackCooldown > 0) {
                    this.attackCooldown--;
                }
                
                // 更新技能冷却
                if (this.skillCooldown > 0) {
                    this.skillCooldown--;
                }
                
                // 处理攻击动画
                if (this.isAttacking) {
                    this.attackFrame++;
                    if (this.attackFrame >= 15) {
                        this.isAttacking = false;
                        this.attackFrame = 0;
                        this.attackBox = null;
                    }
                }
                
                // 处理技能动画
                if (this.isUsingSkill) {
                    this.skillFrame++;
                    if (this.skillFrame >= 30) {
                        this.isUsingSkill = false;
                        this.skillFrame = 0;
                        this.skillBox = null;
                    }
                }
                
                // 水平移动
                if (keys.left) {
                    this.vx = -this.speed;
                    this.facingRight = false;
                } else if (keys.right) {
                    this.vx = this.speed;
                    this.facingRight = true;
                } else {
                    this.vx = 0;
                }
                
                // 应用重力
                this.vy += this.gravity;
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界检查
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;
                
                // 地面检查 (临时，会被平台碰撞覆盖)
                if (this.y > canvas.height - this.height - 30) {
                    this.y = canvas.height - this.height - 30;
                    this.vy = 0;
                    this.onGround = true;
                }
                
                // 更新动画帧
                this.animTimer++;
                if (this.animTimer >= 8) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4;
                }
                
                // 恢复能量 (每2秒恢复5点 = 每120帧)
                if (frameCount % 120 === 0 && this.energy < this.maxEnergy) {
                    this.energy = Math.min(this.maxEnergy, this.energy + 5);
                }
            }
            
            /**
             * 检查是否可以从尖刺区域跳跃
             */
            canJumpFromSpike() {
                for (let spike of spikes) {
                    if (this.x < spike.x + spike.width &&
                        this.x + this.width > spike.x &&
                        this.y + this.height >= spike.y &&
                        this.y + this.height <= spike.y + spike.height + 10) {
                        return true;
                    }
                }
                return false;
            }
            
            /**
             * 跳跃功能
             */
            jump() {
                if (this.onGround || this.canJumpFromSpike()) {
                    this.vy = this.jumpPower;
                    this.onGround = false;
                    playJumpSound();
                }
            }
            
            /**
             * 普通攻击
             * 攻击范围: 20*30px
             * 攻击间隔: 0.5秒
             */
            attack() {
                if (this.attackCooldown > 0) return;
                
                this.isAttacking = true;
                this.attackFrame = 0;
                this.attackCooldown = this.attackCooldownMax;
                
                // 创建攻击判定框
                const attackWidth = 20;
                const attackHeight = 30;
                const attackX = this.facingRight ? this.x + this.width : this.x - attackWidth;
                const attackY = this.y + 10;
                
                this.attackBox = {
                    x: attackX,
                    y: attackY,
                    width: attackWidth,
                    height: attackHeight
                };
                
                playAttackSound();
            }
            
            /**
             * 释放技能
             * 消耗20点能量
             * 技能范围: 50*50px
             * 冷却: 3秒
             */
            useSkill() {
                if (this.energy < 20 || this.skillCooldown > 0) return;
                
                this.energy -= 20;
                this.skillCooldown = this.skillCooldownMax;
                
                this.isUsingSkill = true;
                this.skillFrame = 0;
                
                const skillSize = 50;
                const skillX = this.facingRight ? this.x + this.width : this.x - skillSize;
                const skillY = this.y - 10;
                
                this.skillBox = {
                    x: skillX,
                    y: skillY,
                    width: skillSize,
                    height: skillSize
                };
                
                playSkillSound();
            }
            
            /**
             * 受到伤害
             */
            takeDamage(damage) {
                if (this.invincible > 0) return;
                
                this.health -= damage;
                this.invincible = 60; // 1秒无敌时间
                playHurtSound();
                
                if (this.health <= 0) {
                    this.health = 0;
                    gameOver();
                }
            }
            
            /**
             * 绘制玩家
             */
            draw() {
                ctx.save();
                
                // 无敌时闪烁效果
                if (this.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) {
                    ctx.restore();
                    // 无敌闪烁时不绘制角色，但继续绘制攻击效果
                } else {
                    // 根据朝向翻转
                    if (!this.facingRight) {
                        ctx.translate(this.x + this.width, this.y);
                        ctx.scale(-1, 1);
                        ctx.translate(-this.x, -this.y);
                    }
                    
                    // 绘制像素勇者
                    this.drawPixelHero();
                    
                    ctx.restore();
                }
                
                // 绘制攻击效果 (在canvas原始状态下绘制)
                if (this.isAttacking && this.attackBox) {
                    this.drawAttackEffect();
                }
                
                // 绘制技能效果
                if (this.isUsingSkill && this.skillBox) {
                    this.drawSkillEffect();
                }
            }
            
            /**
             * 绘制像素勇者 (32*48像素)
             * 包含待机、移动、跳跃、攻击动画
             */
            drawPixelHero() {
                const x = this.x;
                const y = this.y;
                const pixelSize = 4; // 每个像素块的大小
                
                // 身体颜色
                const skinColor = '#ffccaa';
                const armorColor = '#6666cc';
                const darkArmorColor = '#4444aa';
                const pantsColor = '#444466';
                const hairColor = '#8b4513';
                const swordColor = '#cccccc';
                const swordHandleColor = '#8b4513';
                
                let frame = 0;
                if (this.isAttacking) {
                    frame = Math.min(Math.floor(this.attackFrame / 5), 2);
                } else if (this.isUsingSkill) {
                    frame = Math.min(Math.floor(this.skillFrame / 10), 2);
                } else if (!this.onGround) {
                    frame = 0;
                } else if (Math.abs(this.vx) > 0) {
                    frame = this.animFrame % 3;
                } else {
                    frame = Math.floor(frameCount / 30) % 2;
                }
                
                // 绘制头部 (8*8像素区域)
                ctx.fillStyle = skinColor;
                ctx.fillRect(x + 12, y + 4, 8, 8);
                
                // 头发
                ctx.fillStyle = hairColor;
                ctx.fillRect(x + 10, y + 2, 12, 4);
                ctx.fillRect(x + 10, y + 4, 2, 4);
                ctx.fillRect(x + 20, y + 4, 2, 4);
                
                // 眼睛
                ctx.fillStyle = '#000';
                if (this.facingRight) {
                    ctx.fillRect(x + 16, y + 6, 2, 2);
                } else {
                    ctx.fillRect(x + 14, y + 6, 2, 2);
                }
                
                // 身体/盔甲 (12*16像素区域)
                ctx.fillStyle = armorColor;
                ctx.fillRect(x + 10, y + 12, 12, 16);
                
                // 盔甲细节
                ctx.fillStyle = darkArmorColor;
                ctx.fillRect(x + 14, y + 14, 4, 8);
                ctx.fillRect(x + 10, y + 20, 12, 2);
                
                // 腿部 (根据动画帧变化)
                ctx.fillStyle = pantsColor;
                if (!this.onGround) {
                    // 跳跃姿势
                    ctx.fillRect(x + 10, y + 28, 5, 12);
                    ctx.fillRect(x + 17, y + 26, 5, 10);
                } else if (Math.abs(this.vx) > 0) {
                    // 移动动画
                    if (frame === 0) {
                        ctx.fillRect(x + 10, y + 28, 5, 20);
                        ctx.fillRect(x + 17, y + 28, 5, 20);
                    } else if (frame === 1) {
                        ctx.fillRect(x + 8, y + 28, 5, 18);
                        ctx.fillRect(x + 19, y + 28, 5, 20);
                    } else {
                        ctx.fillRect(x + 10, y + 28, 5, 20);
                        ctx.fillRect(x + 17, y + 26, 5, 18);
                    }
                } else {
                    // 待机姿势
                    ctx.fillRect(x + 10, y + 28, 5, 20);
                    ctx.fillRect(x + 17, y + 28, 5, 20);
                }
                
                // 手臂和剑 (根据攻击状态变化)
                if (this.isAttacking) {
                    // 攻击动画
                    ctx.fillStyle = skinColor;
                    if (frame === 0) {
                        ctx.fillRect(x + 22, y + 14, 6, 4);
                        ctx.fillRect(x + 26, y + 12, 4, 8);
                    } else if (frame === 1) {
                        ctx.fillRect(x + 24, y + 16, 8, 4);
                        ctx.fillRect(x + 30, y + 14, 4, 8);
                    } else {
                        ctx.fillRect(x + 20, y + 18, 8, 4);
                        ctx.fillRect(x + 26, y + 16, 4, 8);
                    }
                    
                    // 剑
                    ctx.fillStyle = swordHandleColor;
                    ctx.fillRect(x + 28, y + 16, 3, 6);
                    ctx.fillStyle = swordColor;
                    ctx.fillRect(x + 29, y + 6, 2, 12);
                } else if (this.isUsingSkill) {
                    // 技能姿势 - 举剑
                    ctx.fillStyle = skinColor;
                    ctx.fillRect(x + 20, y + 12, 4, 8);
                    ctx.fillRect(x + 22, y + 8, 6, 4);
                    
                    // 剑 (举起)
                    ctx.fillStyle = swordHandleColor;
                    ctx.fillRect(x + 26, y + 6, 3, 6);
                    ctx.fillStyle = swordColor;
                    ctx.fillRect(x + 27, y - 8, 2, 16);
                    
                    // 技能光效
                    ctx.fillStyle = `rgba(100, 100, 255, ${0.5 + Math.sin(frameCount * 0.3) * 0.3})`;
                    ctx.fillRect(x + 24, y - 12, 8, 8);
                } else {
                    // 正常姿势
                    ctx.fillStyle = skinColor;
                    ctx.fillRect(x + 22, y + 14, 4, 10);
                    ctx.fillRect(x + 24, y + 22, 6, 4);
                    
                    // 剑 (收起)
                    ctx.fillStyle = swordHandleColor;
                    ctx.fillRect(x + 28, y + 20, 3, 6);
                    ctx.fillStyle = swordColor;
                    ctx.fillRect(x + 29, y + 10, 2, 12);
                }
            }
            
            /**
             * 绘制攻击效果
             */
            drawAttackEffect() {
                if (!this.attackBox) return;
                
                ctx.save();
                
                const progress = Math.min(this.attackFrame / 15, 1);
                const alpha = Math.max(0, 1 - progress);
                ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.8})`;
                ctx.fillRect(this.attackBox.x, this.attackBox.y, 
                           this.attackBox.width, this.attackBox.height);
                
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                if (this.facingRight) {
                    ctx.moveTo(this.attackBox.x, this.attackBox.y + 5);
                    ctx.lineTo(this.attackBox.x + this.attackBox.width, this.attackBox.y + 15);
                } else {
                    ctx.moveTo(this.attackBox.x + this.attackBox.width, this.attackBox.y + 5);
                    ctx.lineTo(this.attackBox.x, this.attackBox.y + 15);
                }
                ctx.stroke();
                
                ctx.restore();
            }
            
            /**
             * 绘制技能效果
             */
            drawSkillEffect() {
                if (!this.skillBox) return;
                
                ctx.save();
                
                const progress = Math.min(this.skillFrame / 30, 1);
                const alpha = Math.max(0, 1 - progress);
                const scale = 1 + progress * 0.5;
                
                const centerX = this.skillBox.x + this.skillBox.width / 2;
                const centerY = this.skillBox.y + this.skillBox.height / 2;
                const size = this.skillBox.width * scale;
                
                ctx.fillStyle = `rgba(100, 100, 255, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(centerX, centerY, size / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = `rgba(150, 150, 255, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = `rgba(200, 200, 255, ${alpha * 0.8})`;
                ctx.beginPath();
                ctx.arc(centerX, centerY, size / 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // ========================================
        // 平台类
        // ========================================
        
        class Platform {
            constructor(x, y, width, height, type = 'static', moveRange = 0, moveSpeed = 0) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type; // 'static', 'horizontal', 'vertical'
                this.startX = x;
                this.startY = y;
                this.moveRange = moveRange;
                this.moveSpeed = moveSpeed;
                this.moveDirection = 1;
                this.moveTime = 0;
            }
            
            /**
             * 更新平台位置
             */
            update() {
                if (this.type === 'horizontal') {
                    // 水平移动平台
                    this.x += this.moveSpeed * this.moveDirection;
                    if (this.x > this.startX + this.moveRange || this.x < this.startX) {
                        this.moveDirection *= -1;
                    }
                } else if (this.type === 'vertical') {
                    // BUG：关卡2的升降平台，上升到最高点后不会下降，一直停留在顶部
                    // 原代码应该让平台在最高点和最低点之间往返移动
                    // 但这里故意修改了逻辑，导致平台到达顶部后停止
                    
                    // 计算目标位置 (升降高度80px，周期3秒)
                    const period = 180; // 3秒 = 180帧
                    const progress = (frameCount % period) / period;
                    
                    // BUG位置：以下代码导致平台上升到最高点后停止
                    // 正确的代码应该使用正弦或三角函数让平台上下移动
                    // 但这里故意只让平台上升不下降
                    
                    if (this.moveDirection > 0) {
                        // 上升阶段
                        this.y = this.startY - Math.sin(progress * Math.PI) * this.moveRange;
                        
                        // BUG：当到达最高点时，不再改变方向，导致平台停留在顶部
                        if (progress >= 0.5) {
                            this.y = this.startY - this.moveRange; // 固定在最高点
                            // 正确的代码应该继续移动：
                            // this.moveDirection = -1;
                        }
                    }
                    // BUG：缺少下降阶段的处理
                }
            }
            
            /**
             * 绘制平台
             */
            draw() {
                // 平台主体
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // 平台顶部草地
                ctx.fillStyle = '#228b22';
                ctx.fillRect(this.x, this.y, this.width, 6);
                
                // 平台边缘高光
                ctx.fillStyle = '#a0522d';
                ctx.fillRect(this.x, this.y + 6, this.width, 4);
                
                // 平台纹理
                ctx.fillStyle = '#654321';
                for (let i = 8; i < this.height; i += 8) {
                    ctx.fillRect(this.x + 4, this.y + i, this.width - 8, 2);
                }
            }
        }
        
        // ========================================
        // 尖刺陷阱类
        // ========================================
        
        class Spike {
            constructor(x, y, width = 30, height = 30) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.damage = 10;
                this.lastDamageTime = 0; // 上次造成伤害的时间
                
                // BUG：尖刺的闪烁警示动画会在触碰后立即消失
                // 这个变量用于控制动画，但Bug导致它被错误地重置
                this.flashAnimation = true;
                this.flashTimer = 0;
            }
            
            /**
             * 更新尖刺状态
             */
            update() {
                // 闪烁动画 (正常应该持续闪烁)
                this.flashTimer++;
                
                // BUG位置：以下代码导致触碰后动画立即消失
                // 正确的代码应该保持flashAnimation为true
                // 但这里故意在特定条件下将其设为false
            }
            
            /**
             * 检查与玩家的碰撞
             */
            checkCollision(player) {
                if (player.x < this.x + this.width &&
                    player.x + player.width > this.x &&
                    player.y < this.y + this.height &&
                    player.y + this.height > this.y) {
                    
                    const currentTime = Date.now();
                    
                    if (currentTime - this.lastDamageTime < 1000) {
                        return;
                    }
                    
                    player.takeDamage(this.damage);
                    this.lastDamageTime = currentTime;
                }
            }
            
            /**
             * 绘制尖刺
             */
            draw() {
                // BUG：如果flashAnimation为false，尖刺动画消失
                // 正确的代码应该保持动画持续运行
                
                let alpha = 1;
                if (this.flashAnimation) {
                    // 正常闪烁效果
                    alpha = 0.6 + Math.sin(this.flashTimer * 0.2) * 0.4;
                } else {
                    // BUG：触碰后动画消失，变为固定透明度
                    alpha = 0.3;
                }
                
                // 尖刺主体颜色
                const spikeColor = `rgba(150, 150, 150, ${alpha})`;
                const tipColor = `rgba(200, 200, 200, ${alpha})`;
                const warningColor = `rgba(255, 100, 100, ${alpha * 0.5})`;
                
                // 绘制尖刺三角形
                const spikeCount = Math.floor(this.width / 15);
                const spikeWidth = this.width / spikeCount;
                
                for (let i = 0; i < spikeCount; i++) {
                    const sx = this.x + i * spikeWidth;
                    
                    // 警告光晕
                    ctx.fillStyle = warningColor;
                    ctx.beginPath();
                    ctx.moveTo(sx + spikeWidth / 2, this.y - 5);
                    ctx.lineTo(sx + spikeWidth + 5, this.y + this.height);
                    ctx.lineTo(sx - 5, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 尖刺主体
                    ctx.fillStyle = spikeColor;
                    ctx.beginPath();
                    ctx.moveTo(sx + spikeWidth / 2, this.y);
                    ctx.lineTo(sx + spikeWidth, this.y + this.height);
                    ctx.lineTo(sx, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 尖刺高光
                    ctx.fillStyle = tipColor;
                    ctx.beginPath();
                    ctx.moveTo(sx + spikeWidth / 2, this.y);
                    ctx.lineTo(sx + spikeWidth / 2 + 3, this.y + 8);
                    ctx.lineTo(sx + spikeWidth / 2 - 3, this.y + 8);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }
        
        // ========================================
        // 普通敌人类
        // ========================================
        
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 24;
                this.startX = x;
                this.patrolRange = 50 + Math.random() * 50; // 50-100px巡逻范围
                this.speed = 1 + Math.random() * 0.5;
                this.direction = 1;
                this.health = 3;
                this.maxHealth = 3;
                this.damage = 15;
                
                // 动画
                this.animFrame = 0;
                this.animTimer = 0;
                
                // 状态
                this.isDead = false;
                this.deathFrame = 0;
                this.isHit = false;
                this.hitFrame = 0;
            }
            
            /**
             * 更新敌人状态
             */
            update() {
                if (this.isDead) {
                    this.deathFrame++;
                    return;
                }
                
                if (this.isHit) {
                    this.hitFrame++;
                    if (this.hitFrame >= 10) {
                        this.isHit = false;
                        this.hitFrame = 0;
                    }
                }
                
                // 巡逻移动
                this.x += this.speed * this.direction;
                if (this.x > this.startX + this.patrolRange || this.x < this.startX) {
                    this.direction *= -1;
                }
                
                // 更新动画
                this.animTimer++;
                if (this.animTimer >= 10) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 2;
                }
            }
            
            /**
             * 受到伤害
             */
            takeDamage(damage) {
                if (this.isDead) return;
                
                this.health -= damage;
                this.isHit = true;
                this.hitFrame = 0;
                
                if (this.health <= 0) {
                    this.health = 0;
                    this.isDead = true;
                    this.deathFrame = 0;
                    // 掉落金币
                    spawnCoin(this.x + this.width / 2, this.y);
                }
            }
            
            /**
             * 绘制敌人
             */
            draw() {
                if (this.isDead) {
                    this.drawDeathAnimation();
                    return;
                }
                
                ctx.save();
                
                // 被击中时闪烁
                if (this.isHit && Math.floor(this.hitFrame / 2) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 根据朝向翻转
                if (this.direction < 0) {
                    ctx.translate(this.x + this.width, this.y);
                    ctx.scale(-1, 1);
                    ctx.translate(-this.x, -this.y);
                }
                
                this.drawPixelEnemy();
                
                ctx.restore();
            }
            
            /**
             * 绘制像素敌人 (24*24像素)
             */
            drawPixelEnemy() {
                const x = this.x;
                const y = this.y;
                
                // 敌人颜色
                const bodyColor = '#cc4444';
                const darkBodyColor = '#aa2222';
                const eyeColor = '#ffff00';
                const hornColor = '#666666';
                
                // 身体 (根据动画帧变化)
                const bounce = this.animFrame === 0 ? 0 : 2;
                
                // 角
                ctx.fillStyle = hornColor;
                ctx.fillRect(x + 4, y + bounce, 4, 6);
                ctx.fillRect(x + 16, y + bounce, 4, 6);
                
                // 身体
                ctx.fillStyle = bodyColor;
                ctx.fillRect(x + 4, y + 6 + bounce, 16, 14);
                
                // 身体细节
                ctx.fillStyle = darkBodyColor;
                ctx.fillRect(x + 8, y + 10 + bounce, 8, 6);
                
                // 眼睛
                ctx.fillStyle = eyeColor;
                ctx.fillRect(x + 6, y + 8 + bounce, 4, 4);
                ctx.fillRect(x + 14, y + 8 + bounce, 4, 4);
                
                // 瞳孔
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 8, y + 9 + bounce, 2, 2);
                ctx.fillRect(x + 14, y + 9 + bounce, 2, 2);
                
                // 腿
                ctx.fillStyle = darkBodyColor;
                ctx.fillRect(x + 6, y + 18 + bounce, 4, 6);
                ctx.fillRect(x + 14, y + 18 + bounce, 4, 6);
            }
            
            /**
             * 绘制死亡动画
             */
            drawDeathAnimation() {
                const progress = this.deathFrame / 30;
                const alpha = 1 - progress;
                const scale = 1 + progress * 0.5;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.scale(scale, scale);
                
                // 死亡爆炸效果
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // ========================================
        // Boss敌人类
        // ========================================
        
        class Boss {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 64;
                this.height = 64;
                this.speed = 3;
                this.health = 8;
                this.maxHealth = 8;
                this.damage = 20;
                
                // 攻击相关
                this.attackCooldown = 0;
                this.attackInterval = 120; // 2秒
                this.isAttacking = false;
                this.attackFrame = 0;
                
                // 动画
                this.animFrame = 0;
                this.animTimer = 0;
                
                // 状态
                this.isDead = false;
                this.deathFrame = 0;
                this.isHit = false;
                this.hitFrame = 0;
                
                // 攻击范围
                this.attackRange = 80;
            }
            
            /**
             * 更新Boss状态
             */
            update(player) {
                if (this.isDead) {
                    this.deathFrame++;
                    return;
                }
                
                if (this.isHit) {
                    this.hitFrame++;
                    if (this.hitFrame >= 10) {
                        this.isHit = false;
                        this.hitFrame = 0;
                    }
                }
                
                // 追击玩家
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 10) {
                    this.x += (dx / distance) * this.speed;
                    this.y += (dy / distance) * this.speed;
                }
                
                // 限制在画布内
                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height - 30, this.y));
                
                // 范围攻击
                this.attackCooldown++;
                if (this.attackCooldown >= this.attackInterval) {
                    this.attackCooldown = 0;
                    this.performAreaAttack(player);
                }
                
                // 更新动画
                this.animTimer++;
                if (this.animTimer >= 8) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 3;
                }
                
                // 攻击动画
                if (this.isAttacking) {
                    this.attackFrame++;
                    if (this.attackFrame >= 30) {
                        this.isAttacking = false;
                        this.attackFrame = 0;
                    }
                }
            }
            
            /**
             * 执行范围攻击
             */
            performAreaAttack(player) {
                this.isAttacking = true;
                this.attackFrame = 0;
                
                // 检查玩家是否在攻击范围内
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const playerCenterX = player.x + player.width / 2;
                const playerCenterY = player.y + player.height / 2;
                
                const distance = Math.sqrt(
                    Math.pow(centerX - playerCenterX, 2) + 
                    Math.pow(centerY - playerCenterY, 2)
                );
                
                if (distance <= this.attackRange) {
                    player.takeDamage(this.damage);
                }
            }
            
            /**
             * 受到伤害
             */
            takeDamage(damage) {
                if (this.isDead) return;
                
                this.health -= damage;
                this.isHit = true;
                this.hitFrame = 0;
                
                if (this.health <= 0) {
                    this.health = 0;
                    this.isDead = true;
                    this.deathFrame = 0;
                    // 掉落通关钥匙
                    spawnKey(this.x + this.width / 2, this.y + this.height / 2);
                }
            }
            
            /**
             * 绘制Boss
             */
            draw() {
                if (this.isDead) {
                    this.drawDeathAnimation();
                    return;
                }
                
                ctx.save();
                
                // 被击中时闪烁
                if (this.isHit && Math.floor(this.hitFrame / 2) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 攻击范围提示
                if (this.isAttacking) {
                    const alpha = 0.3 + Math.sin(this.attackFrame * 0.5) * 0.2;
                    ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 
                           this.attackRange, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                this.drawPixelBoss();
                
                ctx.restore();
            }
            
            /**
             * 绘制像素Boss (64*64像素)
             */
            drawPixelBoss() {
                const x = this.x;
                const y = this.y;
                const bounce = Math.sin(this.animFrame * 0.5) * 3;
                
                // Boss颜色
                const bodyColor = '#660066';
                const darkBodyColor = '#440044';
                const eyeColor = '#ff0000';
                const hornColor = '#333333';
                
                // 身体阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(x + 5, y + 60, 54, 8);
                
                // 身体
                ctx.fillStyle = bodyColor;
                ctx.fillRect(x + 10, y + 15 + bounce, 44, 40);
                
                // 身体细节
                ctx.fillStyle = darkBodyColor;
                ctx.fillRect(x + 20, y + 25 + bounce, 24, 20);
                
                // 角
                ctx.fillStyle = hornColor;
                ctx.fillRect(x + 5, y + bounce, 10, 20);
                ctx.fillRect(x + 49, y + bounce, 10, 20);
                ctx.fillRect(x + 8, y - 5 + bounce, 6, 10);
                ctx.fillRect(x + 50, y - 5 + bounce, 6, 10);
                
                // 眼睛
                ctx.fillStyle = eyeColor;
                ctx.fillRect(x + 18, y + 22 + bounce, 10, 10);
                ctx.fillRect(x + 36, y + 22 + bounce, 10, 10);
                
                // 瞳孔
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(x + 21, y + 24 + bounce, 4, 4);
                ctx.fillRect(x + 39, y + 24 + bounce, 4, 4);
                
                // 嘴巴
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 24, y + 40 + bounce, 16, 6);
                
                // 牙齿
                ctx.fillStyle = '#fff';
                ctx.fillRect(x + 26, y + 40 + bounce, 4, 4);
                ctx.fillRect(x + 34, y + 40 + bounce, 4, 4);
                
                // 手臂
                ctx.fillStyle = bodyColor;
                ctx.fillRect(x - 5, y + 25 + bounce, 15, 25);
                ctx.fillRect(x + 54, y + 25 + bounce, 15, 25);
                
                // 爪子
                ctx.fillStyle = hornColor;
                ctx.fillRect(x - 8, y + 45 + bounce, 8, 12);
                ctx.fillRect(x + 64, y + 45 + bounce, 8, 12);
                
                // 血条
                const barWidth = 60;
                const barHeight = 6;
                const healthPercent = this.health / this.maxHealth;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(x + 2, y - 12 + bounce, barWidth, barHeight);
                
                ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillRect(x + 2, y - 12 + bounce, barWidth * healthPercent, barHeight);
            }
            
            /**
             * 绘制死亡动画
             */
            drawDeathAnimation() {
                const progress = this.deathFrame / 60;
                const alpha = 1 - progress;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // 大爆炸效果
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                
                // 外圈
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 40 + progress * 40, 0, Math.PI * 2);
                ctx.fill();
                
                // 中圈
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 30 + progress * 30, 0, Math.PI * 2);
                ctx.fill();
                
                // 内圈
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 20 + progress * 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // ========================================
        // 道具类
        // ========================================
        
        class Item {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'coin', 'health', 'energy'
                this.width = type === 'coin' ? 16 : 20;
                this.height = type === 'coin' ? 16 : 20;
                this.collected = false;
                this.collectFrame = 0;
                this.bobOffset = Math.random() * Math.PI * 2;
            }
            
            /**
             * 更新道具状态
             */
            update() {
                if (this.collected) {
                    this.collectFrame++;
                }
            }
            
            /**
             * 收集道具
             */
            collect(player) {
                if (this.collected) return;
                
                this.collected = true;
                this.collectFrame = 0;
                playCollectSound();
                
                switch(this.type) {
                    case 'coin':
                        player.score += 10;
                        break;
                    case 'health':
                        player.health = Math.min(player.maxHealth, player.health + 30);
                        break;
                    case 'energy':
                        player.energy = Math.min(player.maxEnergy, player.energy + 30);
                        break;
                }
            }
            
            /**
             * 绘制道具
             */
            draw() {
                if (this.collected) {
                    this.drawCollectAnimation();
                    return;
                }
                
                const bob = Math.sin(frameCount * 0.1 + this.bobOffset) * 3;
                
                switch(this.type) {
                    case 'coin':
                        this.drawCoin(bob);
                        break;
                    case 'health':
                        this.drawHealthPack(bob);
                        break;
                    case 'energy':
                        this.drawEnergyPack(bob);
                        break;
                }
            }
            
            /**
             * 绘制金币 (16*16像素)
             */
            drawCoin(bob) {
                const x = this.x;
                const y = this.y + bob;
                
                // 金币光晕
                ctx.fillStyle = `rgba(255, 215, 0, ${0.3 + Math.sin(frameCount * 0.2) * 0.2})`;
                ctx.beginPath();
                ctx.arc(x + 8, y + 8, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币主体
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(x + 8, y + 8, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币内圈
                ctx.fillStyle = '#ffec8b';
                ctx.beginPath();
                ctx.arc(x + 8, y + 8, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币符号
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('$', x + 8, y + 12);
            }
            
            /**
             * 绘制血包 (20*20像素)
             */
            drawHealthPack(bob) {
                const x = this.x;
                const y = this.y + bob;
                
                // 血包背景
                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, 20, 20);
                
                // 血包边框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, 20, 20);
                
                // 红十字
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(x + 8, y + 3, 4, 14);
                ctx.fillRect(x + 3, y + 8, 14, 4);
            }
            
            /**
             * 绘制能量包 (20*20像素)
             */
            drawEnergyPack(bob) {
                const x = this.x;
                const y = this.y + bob;
                
                // 能量包背景
                
                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, 20, 20);
                
                // 能量包边框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, 20, 20);
                
                // 蓝色闪电符号
                ctx.fillStyle = '#4444ff';
                ctx.beginPath();
                ctx.moveTo(x + 12, y + 3);
                ctx.lineTo(x + 6, y + 10);
                ctx.lineTo(x + 10, y + 10);
                ctx.lineTo(x + 8, y + 17);
                ctx.lineTo(x + 14, y + 10);
                ctx.lineTo(x + 10, y + 10);
                ctx.closePath();
                ctx.fill();
            }
            
            /**
             * 绘制收集动画
             */
            drawCollectAnimation() {
                const progress = this.collectFrame / 20;
                const alpha = 1 - progress;
                const scale = 1 + progress;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.scale(scale, scale);
                
                // 闪烁效果
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Key {

                ctx.beginPath();
                ctx.arc(x + 12, y + 12, 20, 0, Math.PI * 2);

                // 钥匙头 (圆形)

                ctx.beginPath();
                ctx.arc(x + 8, y + 8, 2, 0, Math.PI * 2);

                // 钥匙柄
                ctx.fillStyle = '#ffd700';

        // ========================================
        // 终点门类
        // ========================================
        
        class Door {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 48;
                this.height = 64;
                this.opened = false;
            }
            
            draw() {
                // 门框
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // 门内区域
                if (this.opened) {
                    // 打开状态 - 显示传送门效果
                    const gradient = ctx.createRadialGradient(
                        this.x + this.width / 2, this.y + this.height / 2, 5,
                        this.x + this.width / 2, this.y + this.height / 2, 20
                    );
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#00ffff');
                    gradient.addColorStop(1, '#0088ff');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(this.x + 8, this.y + 8, this.width - 16, this.height - 16);
                    
                    // 旋转效果
                    ctx.save();
                    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                    ctx.rotate(frameCount * 0.05);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // 关闭状态
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(this.x + 8, this.y + 8, this.width - 16, this.height - 16);
                    
                    // 锁图标
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(this.x + 18, this.y + 24, 12, 10);
                    ctx.beginPath();
                    ctx.arc(this.x + 24, this.y + 24, 6, Math.PI, 0);
                    ctx.stroke();
                }
            }
        }

        /**
         * 随机生成道具
         */
        function spawnRandomItem() {
            const types = ['coin', 'health', 'energy'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            // 随机位置 (避免生成在尖刺上)
            let x, y;
            let validPosition = false;
            let attempts = 0;
            
            while (!validPosition && attempts < 10) {
                x = 100 + Math.random() * 800;
                y = 200 + Math.random() * 200;
                validPosition = true;
                
                // 检查是否与尖刺重叠
                for (let spike of spikes) {
                    if (x < spike.x + spike.width && x + 20 > spike.x &&
                        y < spike.y + spike.height && y + 20 > spike.y) {
                        validPosition = false;
                        break;
                    }
                }
                attempts++;
            }
            
            if (validPosition) {
                items.push(new Item(x, y, type));
            }
        }
        
        // ========================================
        // 碰撞检测系统
        // ========================================
        
        /**
         * 检查两个矩形是否碰撞
         */
        function checkRectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        /**
         * 处理玩家与平台的碰撞
         */
        function handlePlatformCollisions() {
            player.onGround = false;
            
            for (let platform of platforms) {
                // 检查是否站在平台上
                if (player.vy >= 0 &&
                    player.y + player.height <= platform.y + player.vy + 5 &&
                    player.y + player.height >= platform.y &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width) {
                    
                    player.y = platform.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    
                    // 如果是移动平台，跟随平台移动
                    if (platform.type === 'horizontal') {
                        player.x += platform.moveSpeed * platform.moveDirection;
                    }
                }
                
                // 检查左右碰撞
                if (player.y + player.height > platform.y + 5 &&
                    player.y < platform.y + platform.height) {
                    
                    // 左侧碰撞
                    if (player.x + player.width > platform.x &&
                        player.x < platform.x &&
                        player.vx > 0) {
                        player.x = platform.x - player.width;
                        player.vx = 0;
                    }
                    
                    // 右侧碰撞
                    if (player.x < platform.x + platform.width &&
                        player.x + player.width > platform.x + platform.width &&
                        player.vx < 0) {
                        player.x = platform.x + platform.width;
                        player.vx = 0;
                    }
                }
            }
        }
        
        /**
         * 处理玩家与敌人的碰撞
         */
        function handleEnemyCollisions() {
            for (let enemy of enemies) {
                if (enemy.isDead) continue;
                
                // 检查玩家攻击命中敌人
                if (player.attackBox && checkRectCollision(player.attackBox, enemy)) {
                    enemy.takeDamage(1);
                }
                
                // 检查技能命中敌人
                if (player.skillBox && checkRectCollision(player.skillBox, enemy)) {
                    enemy.takeDamage(3);
                }
                
                // 检查敌人碰到玩家
                if (checkRectCollision(player, enemy)) {
                    player.takeDamage(enemy.damage);
                }
            }
            
            // Boss碰撞检测
            if (boss && !boss.isDead) {
                // 玩家攻击Boss
                if (player.attackBox) {
                    const bossRect = { x: boss.x, y: boss.y, width: boss.width, height: boss.height };
                    if (checkRectCollision(player.attackBox, bossRect)) {
                        boss.takeDamage(1);
                    }
                }
                
                // 技能攻击Boss
                if (player.skillBox) {
                    const bossRect = { x: boss.x, y: boss.y, width: boss.width, height: boss.height };
                    if (checkRectCollision(player.skillBox, bossRect)) {
                        boss.takeDamage(3);
                    }
                }
            }
        }
        
        /**
         * 处理玩家与道具的碰撞
         */
        function handleItemCollisions() {
            for (let item of items) {
                if (item.collected) continue;
                
                const itemRect = { x: item.x, y: item.y, width: item.width, height: item.height };
                if (checkRectCollision(player, itemRect)) {
                    item.collect(player);
                }
            }
            
            // 检查钥匙收集
            if (key && !key.collected) {
                const keyRect = { x: key.x, y: key.y, width: key.width, height: key.height };
                if (checkRectCollision(player, keyRect)) {
                    key.collected = true;
                    hasKey = true;
                    playCollectSound();
                    if (door) door.opened = true;
                }
            }
        }
        
        /**
         * 处理玩家与尖刺的碰撞
         */
        function handleSpikeCollisions() {
            for (let spike of spikes) {
                spike.checkCollision(player);
            }
        }
        
        /**
         * 检查是否到达终点
         */
        function checkLevelComplete() {
            if (!door) return;
            
            const doorRect = { x: door.x, y: door.y, width: door.width, height: door.height };
            if (checkRectCollision(player, doorRect)) {
                if (currentLevel === 1 && hasKey) {
                    // 进入关卡2
                    currentLevel = 2;
                    initLevel2();
                } else if (currentLevel === 2 && hasKey) {
                    // 游戏胜利
                    victory();
                }
            }
        }

        // ========================================
        
        function updateUI() {
            // 更新血量显示
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('healthFill').style.width = healthPercent + '%';
            document.getElementById('healthText').textContent = `${player.health}/${player.maxHealth}`;
            
            // 更新能量显示
            const energyPercent = (player.energy / player.maxEnergy) * 100;
            document.getElementById('energyFill').style.width = energyPercent + '%';
            document.getElementById('energyText').textContent = `${player.energy}/${player.maxEnergy}`;
            
            // 更新分数
            document.getElementById('scoreText').textContent = player.score;
            
            // 更新关卡进度
            let progress = 0;
            if (currentLevel === 1) {
                progress = (player.x / 1000) * 50;
            } else {
                progress = 50 + (player.x / 1000) * 50;
            }
            progress = Math.min(100, Math.max(0, progress));
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = Math.floor(progress) + '%';
        }

        function gameOver() {

        function victory() {
            currentState = GameState.VICTORY;
            document.getElementById('endTitle').textContent = '恭喜通关！';
            document.getElementById('endTitle').className = 'victory-title';
            document.getElementById('finalScore').textContent = player.score;
            document.getElementById('gameOverScreen').classList.add('active');
        }
        
        function pauseGame() {
            if (currentState === GameState.PLAYING) {
                currentState = GameState.PAUSED;
                document.getElementById('pauseScreen').classList.add('active');
            }
        }
        
        function resumeGame() {
            if (currentState === GameState.PAUSED) {
                currentState = GameState.PLAYING;
                document.getElementById('pauseScreen').classList.remove('active');
            }
        }
        
        function resetGame() {
            currentState = GameState.PLAYING;
            currentLevel = 1;
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('pauseScreen').classList.remove('active');
            initLevel1();
        }
        
        function restartLevel() {
            currentState = GameState.PLAYING;
            document.getElementById('gameOverScreen').classList.remove('active');
            if (currentLevel === 1) {
                initLevel1();
            } else {
                initLevel2();
            }
        }
        
        // ========================================
        // 游戏主循环
        // ========================================
        
        function gameLoop() {
            if (currentState === GameState.PLAYING) {
                // 清空画布
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制背景装饰
                drawBackground();
                
                // 更新帧计数
                frameCount++;
                
                // 生成道具 (每3秒生成1个)
                itemSpawnTimer++;
                if (itemSpawnTimer >= 180) {
                    itemSpawnTimer = 0;
                    spawnRandomItem();
                }
                
                // 更新和绘制平台
                for (let platform of platforms) {
                    platform.update();
                    platform.draw();
                }
                
                // 更新和绘制尖刺
                for (let spike of spikes) {
                    spike.update();
                    spike.draw();
                }
                
                // 更新和绘制敌人
                for (let enemy of enemies) {
                    enemy.update();
                    enemy.draw();
                }
                
                // 更新和绘制Boss
                if (boss) {
                    boss.update(player);
                    boss.draw();
                }
                
                // 更新和绘制道具
                items = items.filter(item => !item.collected || item.collectFrame < 20);
                for (let item of items) {
                    item.update();
                    item.draw();
                }
                
                // 更新和绘制钥匙
                if (key && !key.collected) {
                    key.update();
                    key.draw();
                }
                
                // 绘制终点门
                if (door) {
                    door.draw();
                }
                
                // 更新和绘制玩家
                player.update();
                handlePlatformCollisions();
                handleEnemyCollisions();
                handleItemCollisions();
                handleSpikeCollisions();
                checkLevelComplete();
                player.draw();
                
                // 更新UI
                updateUI();
            }
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        /**
         * 绘制背景装饰
         */
        function drawBackground() {
            // 绘制星星
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 53) % (canvas.height - 100);
                const size = (i % 3) + 1;
                const alpha = 0.3 + (Math.sin(frameCount * 0.05 + i) * 0.2);
                ctx.globalAlpha = alpha;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;
            
            // 绘制远景山脉
            ctx.fillStyle = '#0f3460';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 50);
            for (let x = 0; x <= canvas.width; x += 50) {
                const y = canvas.height - 100 - Math.sin(x * 0.01) * 50;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.closePath();
            ctx.fill();
        }
        
        // ========================================
        // 事件监听
        // ========================================
        
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('resumeBtn').addEventListener('click', resumeGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('restartLevelBtn').addEventListener('click', restartLevel);
        document.getElementById('restartBtn').addEventListener('click', resetGame);
        
        // ========================================
        // 游戏初始化
        // ========================================
        
        initLevel1();
        gameLoop();
    </script>
</body>
</html>
